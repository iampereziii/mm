          'mgnl:template': 'opella-lm-templates:global/components/main/sections/richText/V1/richText'
          'richText': '<p>Depois de ler tantos nomes complicados, é importante entender
            que a composição da microbiota&nbsp;<strong>pode variar de pessoa para
            pessoa</strong>. Mas o equilíbrio saudável dessas bactérias é fundamental
            para todos: só assim elas podem conviver de forma harmoniosa e desempenhar
            suas funções<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1</sup></a>.</p>'
