                '0':
                  'jcr:primaryType': 'mgnl:component'
                  'jcr:uuid': '0dfae5f1-7090-4bbb-afb7-9eac7605a672'
                  'mgnl:activationStatus': true
                  'mgnl:created': 2026-01-15T14:46:12.097+01:00
                  'mgnl:createdBy': 'Brayan.Palatino@sanofi.com'
                  'mgnl:lastActivated': 2026-03-10T10:34:57.452+01:00
                  'mgnl:lastActivatedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:lastModified': 2026-03-10T10:18:19.658+01:00
                  'mgnl:lastModifiedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>A&nbsp;<a href="${link:{uuid:{68d9be9f-647c-4746-a713-b8ada7803b0e},repository:{website},path:{/enterogermina/pt-br/saude-intestinal/sistema-digestivo/disbiose-intestinal}}}"><strong><u>disbiose
                    intestinal</u></strong></a>&nbsp;é caracterizada pela alteração
                    indesejável na composição da microbiota intestinal, resultante
                    do&nbsp;<strong>desequilíbrio</strong>&nbsp;entre as bactérias
                    boas e as patogênicas (consideradas ruins)<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.&nbsp;</p><p>Essa
                    é uma condição que pode estar associada a várias doenças que acometem
                    o intestino,&nbsp;<strong><u>como síndrome do intestino irritável&nbsp;e&nbsp;doenças
                    inflamatórias intestinais</u></strong><a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.
                    &nbsp;</p><p>Entre os principais&nbsp;<strong>sintomas da disbiose
                    intestinal</strong>&nbsp;estão:&nbsp;</p><ul><li>flatulência<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;&nbsp;<br>&nbsp;</li><li>diarreia<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>constipação<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>inchaço<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>dor estomacal e intestinal<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>azia<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>cólicas<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>náuseas<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>vômitos<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.&nbsp;</li></ul><p>O
                    tratamento, que deve ser prescrito por um médico especializado,
                    envolve duas frentes. Uma delas é dietética, ou seja, com mudanças
                    na alimentação, incluindo alimentos que beneficiam a constituição
                    da microbiota intestinal. A outra é o uso de medicamentos<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.&nbsp;</p><p>Então,
                    já sabe: faça o possível para manter as bactérias boas sempre
                    por perto e escapar de males que desequilibram seu intestino!</p>'
                  'title': '<h3>Disbiose intestinal: o que é e como tratar</h3>'
