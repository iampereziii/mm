                '0':
                  'jcr:primaryType': 'mgnl:component'
                  'jcr:uuid': 'a957cf84-5794-474f-97c7-ab6c3fdb005c'
                  'mgnl:activationStatus': true
                  'mgnl:created': 2026-01-15T14:37:22.931+01:00
                  'mgnl:createdBy': 'Brayan.Palatino@sanofi.com'
                  'mgnl:lastActivated': 2026-03-10T10:34:57.193+01:00
                  'mgnl:lastActivatedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:lastModified': 2026-03-10T10:22:16.460+01:00
                  'mgnl:lastModifiedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Os suplementos&nbsp;<a href="https://author-opl02.uat.magnolia.sanofi-infra.com/enterogermina-pt-br/pt-br/saude-intestinal/dicas-gerais-bem-estar/probioticos-prebioticos"><strong><u>probióticos</u></strong></a>&nbsp;podem
                    complementar a alimentação, já que trazem em sua fórmula uma boa
                    carga de bactérias boas para&nbsp;<strong>colonizar o intestino</strong>&nbsp;e
                    manter a&nbsp;<strong>microbiota equilibrada</strong><a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4,5</sup></a>.&nbsp;</p><p>Cada
                    tipo de cepa presente nos probióticos tem uma&nbsp;<strong>função
                    específica</strong>&nbsp;e pode ajudar a cuidar de uma condição
                    de saúde diferente. Por isso, não deixe de bater um papo com seu
                    médico para entender suas necessidades<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.
                    &nbsp;</p><p><strong>Enterogermina</strong>&nbsp;é um suplemento
                    alimentar com 2 ou 4 bilhões (de acordo com a versão escolhida)
                    de esporos de&nbsp;<i>Bacillus clausii</i><a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>7,8</sup></a>,
                    que são bactérias do bem que contribuem para o equilíbrio da microbiota
                    intestinal<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>8</sup></a>.&nbsp;</p><p>Esses
                    microrganismos vivos são resistentes ao ácido gástrico, o que
                    faz com que eles cheguem intactos ao intestino, restaurando a
                    flora intestinal<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>9</sup></a>.&nbsp;</p><p>Enterogermina
                    está disponível no formato de flaconetes e já vem pronta para
                    beber<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>8,9</sup></a>.
                    Há ainda a versão adulto, que vem em sachês e os grânulos se dissolvem
                    diretamente na boca<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>10</sup></a>.</p>'
                  'title': '<h3>4. Considere a ingestão de suplementos probióticos</h3>'
