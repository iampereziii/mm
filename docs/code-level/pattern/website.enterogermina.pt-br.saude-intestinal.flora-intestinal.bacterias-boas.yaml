                '0':
                  'jcr:primaryType': 'mgnl:component'
                  'jcr:uuid': '63dac6c6-744b-46db-a838-f0ed1b6325c6'
                  'mgnl:activationStatus': true
                  'mgnl:created': 2026-01-15T14:35:43.883+01:00
                  'mgnl:createdBy': 'Brayan.Palatino@sanofi.com'
                  'mgnl:lastActivated': 2026-03-10T10:34:57.142+01:00
                  'mgnl:lastActivatedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:lastModified': 2026-03-10T10:17:05.475+01:00
                  'mgnl:lastModifiedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Os prebióticos são componentes alimentares como&nbsp;<a
                    href="${link:{uuid:{17f76f66-fd9c-468c-9d98-9a363067dfe8},repository:{website},path:{/enterogermina/pt-br/saude-intestinal/dicas-gerais-bem-estar/fibras-alimentares}}}"><strong><u>fibras</u></strong></a>&nbsp;e
                    carboidratos complexos que nossas células não conseguem digerir.
                    Com isso, eles se tornam&nbsp;<strong>alimento para as bactérias
                    boas</strong>&nbsp;do intestino<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4,5</sup></a>.&nbsp;</p><p>Estudos
                    mostram, inclusive, que prebióticos podem promover o crescimento
                    de bifidobactérias e lactobacilos na microbiota<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>6</sup></a>.&nbsp;</p><p>Vegetais
                    verde-folhosos, como alcachofra, aspargo, brócolis e espinafre,
                    são bons exemplos de alimentos ricos em fibras que podem se tornar
                    “combustível” para as &nbsp;bactérias do bem<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.&nbsp;</p><p>Mas
                    também existem outros alimentos prebióticos que podem ajudar a
                    alimentar as bactérias boas no intestino. Aqui estão alguns deles:&nbsp;</p><ul><li>alho<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>banana<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>cebola<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>feijão<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>grãos
                    integrais<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>lentilha<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>maçã<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>nozes<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>sementes<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.</li></ul>'
                  'title': '<h3>3. Lembre-se também dos alimentos prebióticos</h3>'
