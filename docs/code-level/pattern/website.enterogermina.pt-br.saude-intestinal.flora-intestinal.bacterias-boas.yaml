                  'mgnl:lastModifiedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Esse tipo de medicamento - que deve ser tomado apenas
                    com indicação e receita médica - é eficaz para tratar doenças
                    causadas por bactérias ruins. O problema é que, ao combater essas
                    vilãs, os&nbsp;<a href="${link:{uuid:{100da2be-2f18-4d0f-a3f2-dc32f1181df0},repository:{website},path:{/enterogermina/pt-br/saude-intestinal/sistema-digestivo/antibiotico}}}"><strong><u>antibióticos</u></strong></a>&nbsp;também
                    acabam&nbsp;<strong>eliminando as bactérias boas</strong>&nbsp;que
                    habitam o intestino, deixando a microbiota desequilibrada<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,4</sup></a>.</p><p>É
                    por esse motivo que, idealmente, o tratamento com antibióticos
                    seja acompanhado do uso de&nbsp;<strong>probióticos</strong>&nbsp;para
                    restabelecer a harmonia dessa comunidade de microrganismos vivos<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.</p>'
