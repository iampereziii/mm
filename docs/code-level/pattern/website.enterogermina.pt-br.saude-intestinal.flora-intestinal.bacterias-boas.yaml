                '0':
                  'jcr:primaryType': 'mgnl:component'
                  'jcr:uuid': 'b46e6cd0-2a34-4eb3-8126-f59e50c66ecc'
                  'mgnl:activationStatus': true
                  'mgnl:created': 2026-01-15T14:42:18.413+01:00
                  'mgnl:createdBy': 'Brayan.Palatino@sanofi.com'
                  'mgnl:lastActivated': 2026-03-10T10:34:57.357+01:00
                  'mgnl:lastActivatedBy': 'Augusto.Remojo@sanofi.com'
                  'mgnl:lastModified': 2026-01-15T14:43:16.474+01:00
                  'mgnl:lastModifiedBy': 'Brayan.Palatino@sanofi.com'
                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Os&nbsp;<strong>carboidratos simples</strong>&nbsp;(encontrados
                    em biscoitos, pães brancos e chocolates, por exemplo) são digeridos
                    de forma muito rápida pelo organismo, o que deixa as bactérias
                    sem nenhuma fonte para se alimentar<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.</p><p>Quando
                    você consome esse tipo de alimento com muita frequência, elas
                    ficam “famintas” e podem até mesmo “mastigar” o revestimento do
                    seu intestino, o que pode levar à&nbsp;<strong>inflamação</strong><a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.&nbsp;&nbsp;</p><p>O
                    segredo é adicionar mais&nbsp;<strong>carboidratos complexos</strong>&nbsp;no
                    dia a dia, que são digeridos lentamente e mantém as bactérias
                    felizes. Prefira consumir banana, batata-doce, farinha de coco
                    e maçã, por exemplo, a alimentos processados e doces<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.</p>'
                  'title': '<h3>Excesso de açúcar</h3>'
