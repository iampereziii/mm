          'mgnl:lastModifiedBy': 'Augusto.Remojo@sanofi.com'
          'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
          'richText': '<p>Você pode usar a alimentação e a suplementação a seu favor
            para melhorar a diversidade de microrganismos que vivem na sua microbiota
            e aumentar a presença de bactérias boas no intestino<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>3-6</sup></a>.&nbsp;</p><p>Em
            linhas gerais, o nível de variação da sua dieta, o consumo de alimentos&nbsp;<a
            href="${link:{uuid:{30097a6c-db75-4f12-8adf-7505704f02c3},repository:{website},path:{/enterogermina/pt-br/saude-intestinal/dicas-gerais-bem-estar/probioticos-prebioticos}}}"><strong><u>probióticos
            e prebióticos</u></strong></a>, bem como a suplementação de probióticos
            e da vitamina D podem contribuir para o aumento da população de bactérias
            benéficas no organismo<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>3-6</sup></a>.&nbsp;</p><p>Além
            disso, para não comprometer a existência e a ação dessas bactérias, é
            preciso evitar perigos como o uso excessivo de antibióticos, os grandes
            picos de estresse e o exagero de açúcar na dieta, entre outros hábitos<a
            href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,4</sup></a>.&nbsp;</p><p>Mas
            deixe com a gente! A seguir, vamos detalhar todas essas informações para
            você manter sua saúde intestinal em dia!</p>'
          'title': '<h2>O que pode aumentar as bactérias boas do intestino?</h2>'
