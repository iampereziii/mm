          'jcr:primaryType': 'mgnl:component'
          'jcr:uuid': '6b21014c-fed7-4fa6-8095-d25d8fe31d00'
          'mgnl:activationStatus': true
          'mgnl:created': 2025-10-21T16:14:29.747+02:00
