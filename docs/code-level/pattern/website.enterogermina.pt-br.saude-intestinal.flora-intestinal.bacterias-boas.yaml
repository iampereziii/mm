                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>A tensão acumulada do dia a dia é outro fator que
                    pode “bagunçar” seu segundo cérebro, o intestino. Tente relaxar
                    com práticas que&nbsp;<strong>apoiam a sua saúde emocional</strong>,
                    como atenção plena (o famoso&nbsp;<i>mindfulness</i>, em inglês),
                    meditação e ioga<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.&nbsp;</p><p>O
                    fato é: você precisa de uma microbiota saudável para ajudar a
                    gerenciar os agentes estressores do cotidiano. Logo, é necessário
                    energizar o corpo constantemente para ensiná-lo a batalhar pelo
                    seu bem-estar e sua saúde<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.&nbsp;</p><p>Quando
                    todos esses maus hábitos que comentamos prevalecem, pode ocorrer
                    um problema chamado&nbsp;<strong>disbiose intestinal</strong><a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.</p>'
                  'title': '<h3>Estresse</h3>'
