                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Os alimentos fermentados — aqueles que passam por
                    um processo de fermentação que envolve o crescimento de microrganismos
                    — são boas fontes de probióticos. Quando ingeridos, os probióticos
                    “preenchem” o intestino com bactérias boas para a saúde intestinal<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.&nbsp;</p><p>Anote
                    algumas sugestões de alimentos desse tipo:&nbsp;</p><ul><li>iogurte
                    (o ideal é que seja sem açúcar)<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>kombucha
                    (bebida fermentada à base de chás)<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;
                    &nbsp;<br>&nbsp;</li><li>kefir (leite fermentado)<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>picles<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>;&nbsp;<br>&nbsp;</li><li>kimchi
                    (conserva tipicamente coreana preparada com hortaliças como acelga
                    e nabo)<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>4</sup></a>.&nbsp;</li></ul><p>Entenda
                    como os probióticos são um caminho para os&nbsp;<a href="${link:{uuid:{b161914b-a3c9-43fc-8336-49f0a155fdcc},repository:{website},path:{/enterogermina/pt-br/saude-intestinal/dicas-gerais-bem-estar/lactobacilos-vivos}}}"><strong><u>lactobacilos
                    vivos</u></strong></a>.</p>'
                  'title': '<h3>2. Consuma alimentos fermentados</h3>'
