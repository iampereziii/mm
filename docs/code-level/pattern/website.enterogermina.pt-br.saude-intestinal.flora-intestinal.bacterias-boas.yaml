              'mgnl:template': 'opella-lm-templates:global/components/main/sections/richText/V1/richText'
              'richText': '<p style="text-align:center;"><span class="text-body-7
                heading-size-4">O intestino abriga uma comunidade diversificada de
                mais de <strong>100 trilhões de microorganismos</strong>. Entre eles,
                estão as bactérias boas, que trabalham para regular a digestão, favorecer
                a absorção de nutrientes, melhorar a imunidade, proteger contra agentes
                causadores de doenças, entre tantas outras funções, garantindo a integridade
                da barreira presente na mucosa intestinal</span><a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><span
                class="text-body-7 heading-size-4"><sup>1</sup></span></a><span class="text-body-7
                heading-size-4">.</span></p><p style="text-align:center;"><span class="text-body-7
                heading-size-4">Logo, saber <strong>como aumentar as bactérias boas
                no intestino</strong> é um ótimo caminho para ter uma microbiota saudável,
                equilibrada e funcional</span><a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><span
                class="text-body-7 heading-size-4"><sup>1</sup></span></a><span class="text-body-7
                heading-size-4">.&nbsp;&nbsp;</span></p><p style="text-align:center;"><span
                class="text-body-7 heading-size-4">Neste artigo, te contamos o que
                fazer para fortalecer esse exército de aliadas e, consequentemente,
                ter uma boa saúde intestinal. Quais alimentos têm bactérias boas?
                E a suplementação, ajuda? Descubra essas respostas e, de quebra, veja
                o que evitar para não prejudicá-las.</span></p>'
