                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Um estudo brasileiro divulgado na revista&nbsp;<i>Metabolism</i>&nbsp;sugere
                    que os níveis circulantes de&nbsp;<a href="https://author-opl02.uat.magnolia.sanofi-infra.com/enterogermina-pt-br/pt-br/saude-intestinal/dicas-gerais-bem-estar/vitamina-d"><strong><u>vitamina
                    D</u></strong></a>&nbsp;no organismo podem influenciar o perfil
                    da microbiota intestinal<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>11</sup></a>.
                    &nbsp;</p><p>Ainda que os resultados devam ser confirmados por
                    investigações mais aprofundadas, o trabalho científico associou
                    maiores níveis da “vitamina do sol” à maior abundância de bactérias
                    dos gêneros&nbsp;<i>Coprococcus e Bifidobacterium</i>, ambas consideradas
                    benéficas para a saúde<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>11</sup></a>.&nbsp;</p><p>A
                    vitamina D pode ser obtida pela&nbsp;<strong>exposição solar,
                    alimentação</strong>&nbsp;(com o consumo de peixes gordurosos
                    como salmão, atum e cavala, além do óleo de fígado de bacalhau)
                    e&nbsp;<strong>suplementação</strong>&nbsp;em cápsulas, comprimidos
                    ou gotas, quando necessária<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>12</sup></a>.</p>'
                  'title': '<h3>5. Cuide dos seus níveis de vitamina D</h3>'
