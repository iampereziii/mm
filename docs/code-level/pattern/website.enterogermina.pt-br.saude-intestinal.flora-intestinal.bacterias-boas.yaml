          'mgnl:createdBy': 'Philip.Viernes2@sanofi.com'
          'mgnl:lastActivated': 2026-03-10T10:34:57.015+01:00
          'mgnl:lastActivatedBy': 'Augusto.Remojo@sanofi.com'
          'mgnl:lastModified': 2026-03-10T10:20:21.326+01:00
          'mgnl:lastModifiedBy': 'Augusto.Remojo@sanofi.com'
          'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
          'richText': '<div><p>A&nbsp;<a href="${link:{uuid:{bdace27e-a01b-4a27-90a9-4b73d5d8304e},repository:{website},path:{/enterogermina/pt-br/saude-intestinal/flora-intestinal/microbiota-intestinal}}}"><strong><u>microbiota
            intestinal</u></strong></a>&nbsp;é composta por várias espécies de microrganismos,
            que incluem&nbsp;<strong>bactérias, leveduras e vírus</strong><a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1</sup></a>.&nbsp;<br>&nbsp;</p><p>Os
            filos mais comuns de bactérias benéficas abrangem:<br>&nbsp;</p><ul><li>Firmicutes<a
            href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,2</sup></a>;&nbsp;<br>&nbsp;</li><li>Bacteroidetes<a
            href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,2</sup></a>;&nbsp;<br>&nbsp;</li><li>Actinobacteria<a
            href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,2</sup></a>;&nbsp;<br>&nbsp;</li><li>Proteobacteria<a
            href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,2</sup></a>.</li></ul><p><br>Os
            filos Firmicutes e Bacteroidetes representam 90% da microbiota<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1</sup></a>.&nbsp;<br>&nbsp;</p><p>Dentro
            dessas “categorias”, Firmicutes se divide em mais de 200 gêneros diferentes,
            como&nbsp;<i>Lactobacillus</i>,&nbsp;<i>Bacillus</i>,&nbsp;<i>Clostridium</i>,&nbsp;<i>Enterococcus</i>&nbsp;e&nbsp;<i>Ruminicoccus</i>.
            Já o filo Bacteroidetes é composto principalmente por&nbsp;<i>Bacteroides</i><a
            href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,2</sup></a>.&nbsp;<br>&nbsp;</p><p>Apesar
            de estar presente em menores quantidades, vale saber que o filo Actinobacteria
            é representado principalmente pelo gênero&nbsp;<i>Bifidobacterium</i>,
            muito utilizado em suplementos probióticos<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>1,2</sup></a>.<br>&nbsp;</p><p>O
            filo Proteobacteria, por fim, tem&nbsp;<i>Desulfovibrio</i>,&nbsp;<i>Escherichia</i>&nbsp;e&nbsp;<i>Helicobacter</i>&nbsp;como
            representantes<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.<br>&nbsp;</p><p>Dentre
            essas classificações, as&nbsp;<strong>bifidobactérias e os lactobacilos&nbsp;</strong>são
            exemplos de bactérias benéficas<a href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>2</sup></a>.</p></div>'
          'title': '<h2>Quais são as bactérias boas do intestino?</h2>'
