                  'mgnl:template': 'opella-lm-templates:global/components/main/sections/contentBlock/contentBlock'
                  'richText': '<p>Montar o prato com uma boa variedade de itens, de&nbsp;<strong>diferentes
                    grupos alimentares</strong>, é o primeiro passo para aumentar
                    as bactérias boas do intestino. Quanto mais diversificada for
                    a sua dieta, maior diversidade de microrganismos terá a sua microbiota<a
                    href="#anchor-9d4494c5-a982-4e4c-8c42-7622a483c457"><sup>3</sup></a>.</p><p>Então,
                    a dica é rever toda a lista do mercado, experimentar novas combinações
                    e tornar o cardápio da semana um “arco-íris” de alimentos saudáveis.</p>'
                  'title': '<h3>1. Tenha uma dieta bastante variada</h3>'
